<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUSTAT · Wage Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e0f;
    --surface: #111618;
    --border: #1e2729;
    --accent: #00e5a0;
    --accent2: #00b4ff;
    --text: #e8edef;
    --muted: #5a6b70;
    --danger: #ff4d6d;
    --card: #141a1c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 2rem;
    margin-bottom: 2.5rem;
  }

  .logo {
    font-family: 'Fraunces', serif;
    font-size: 0.75rem;
    font-weight: 300;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 600;
    line-height: 1.1;
    letter-spacing: -0.02em;
  }

  h1 span {
    font-style: italic;
    font-weight: 300;
    color: var(--accent);
  }

  .subtitle {
    margin-top: 0.75rem;
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing: 0.05em;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 0.25rem;
    margin-bottom: 2rem;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    padding: 0.6rem 1.2rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.2s;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Panel */
  .panel { display: none; }
  .panel.active { display: block; }

  /* Controls grid */
  .controls {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .field label {
    display: block;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .field select, .field input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    padding: 0.6rem 0.8rem;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.2s;
    appearance: none;
    -webkit-appearance: none;
  }

  .field select:focus, .field input:focus {
    border-color: var(--accent);
  }

  /* Button */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.7rem 1.5rem;
    background: var(--accent);
    color: #000;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn:hover { background: #00ffb3; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-row {
    display: flex;
    gap: 1rem;
    align-items: center;
    flex-wrap: wrap;
  }

  /* Results */
  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.5rem;
    margin-top: 1.5rem;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1rem;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .result-title {
    font-family: 'Fraunces', serif;
    font-size: 1.1rem;
    font-weight: 600;
  }

  .result-meta {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* Table */
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
    margin-top: 1rem;
  }

  .data-table th {
    text-align: left;
    padding: 0.5rem 0.75rem;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }

  .data-table td {
    padding: 0.5rem 0.75rem;
    border-bottom: 1px solid rgba(30,39,41,0.6);
  }

  .data-table tr:hover td { background: rgba(0,229,160,0.03); }

  .val {
    color: var(--accent);
    font-weight: 500;
    text-align: right;
  }

  /* Bar chart */
  .bar-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.5rem 0;
    border-bottom: 1px solid rgba(30,39,41,0.5);
  }

  .bar-label {
    font-size: 0.72rem;
    color: var(--text);
    width: 220px;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .bar-track {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px;
    transition: width 0.8s cubic-bezier(0.16,1,0.3,1);
  }

  .bar-val {
    font-size: 0.72rem;
    color: var(--accent);
    width: 90px;
    text-align: right;
    flex-shrink: 0;
  }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 2rem;
    color: var(--muted);
    font-size: 0.8rem;
  }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  .error-box {
    border: 1px solid var(--danger);
    background: rgba(255,77,109,0.05);
    border-radius: 4px;
    padding: 1rem;
    font-size: 0.8rem;
    color: var(--danger);
    margin-top: 1.5rem;
  }

  /* Status badge */
  .status {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
  }

  .dot.online { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

  /* Responsive */
  @media (max-width: 600px) {
    .bar-label { width: 120px; font-size: 0.65rem; }
    .bar-val { width: 70px; font-size: 0.65rem; }
    .controls { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">STATEC Luxembourg · LUSTAT</div>
    <h1>Wage <span>Explorer</span></h1>
    <div class="subtitle">DF_C1217 · Monthly average wages · NACE Rev.2 × Education level · 2010–present</div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('timeseries')">Time Series</button>
    <button class="tab" onclick="switchTab('sectors')">Compare Sectors</button>
    <button class="tab" onclick="switchTab('education')">Compare Education</button>
  </div>

  <!-- TIME SERIES -->
  <div id="tab-timeseries" class="panel active">
    <div class="controls">
      <div class="field">
        <label>Sector (NACE)</label>
        <select id="ts-sector"></select>
      </div>
      <div class="field">
        <label>Education Level</label>
        <select id="ts-edu"></select>
      </div>
      <div class="field">
        <label>From Year</label>
        <input type="number" id="ts-start" value="2010" min="2010" max="2024">
      </div>
      <div class="field">
        <label>To Year</label>
        <input type="number" id="ts-end" placeholder="latest" min="2010" max="2024">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="runTimeSeries()">▶ Run Query</button>
      <div class="status"><div class="dot online" id="status-dot"></div><span id="status-text">API online</span></div>
    </div>
    <div id="ts-result"></div>
  </div>

  <!-- COMPARE SECTORS -->
  <div id="tab-sectors" class="panel">
    <div class="controls">
      <div class="field">
        <label>Education Level</label>
        <select id="sec-edu"></select>
      </div>
      <div class="field">
        <label>Year</label>
        <input type="number" id="sec-year" value="2022" min="2010" max="2024">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="runSectors()">▶ Compare All Sectors</button>
    </div>
    <div id="sec-result"></div>
  </div>

  <!-- COMPARE EDUCATION -->
  <div id="tab-education" class="panel">
    <div class="controls">
      <div class="field">
        <label>Sector (NACE)</label>
        <select id="edu-sector"></select>
      </div>
      <div class="field">
        <label>Year</label>
        <input type="number" id="edu-year" value="2022" min="2010" max="2024">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="runEducation()">▶ Compare Education Levels</button>
    </div>
    <div id="edu-result"></div>
  </div>

</div>

<script>
const NACE = {
  "_T":"Total (all sectors)","B-E":"Industry (B–E)","F":"Construction",
  "G":"Wholesale & retail","H":"Transportation","I":"Accommodation & food",
  "J":"Information & communication","K":"Financial & insurance",
  "L_N":"Real estate & professional","M":"Scientific & technical",
  "O":"Public administration","P":"Education sector","Q":"Health & social work",
  "R_S":"Arts & other services"
};

const EDU = {
  "A4":"All levels combined",
  "ED0_2":"Primary & lower secondary (ISCED 0-2)",
  "ED3_4":"Upper secondary (ISCED 3-4)",
  "ED5_8":"Tertiary education (ISCED 5-8)"
};

// Populate selects
function populate(id, map, includeAll=false) {
  const sel = document.getElementById(id);
  if (includeAll) sel.innerHTML = \`<option value="_T">Total (all sectors)</option>\`;
  else sel.innerHTML = '';
  Object.entries(map).forEach(([k,v]) => {
    if (k==="_T") return;
    sel.innerHTML += \`<option value="\${k}">\${v}</option>\`;
  });
}

populate("ts-sector", NACE, true);
populate("ts-edu", EDU);
populate("sec-edu", EDU);
populate("edu-sector", NACE, true);

// Tab switching
function switchTab(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  event.target.classList.add('active');
}

// Call the Railway MCP server
async function callMCP(toolName, args) {
  const base = window.location.origin;
  let res, raw, data;
  try {
    res = await fetch(\`\${base}/messages\`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ jsonrpc:'2.0', id:Date.now(), method:'tools/call', params:{name:toolName,arguments:args} })
    });
    raw = await res.text();
  } catch(e) { throw new Error(\`Network: \${e.message}\`); }
  console.log('[RAW]', raw.slice(0,500));
  if (!res.ok) throw new Error(\`HTTP \${res.status}: \${raw.slice(0,200)}\`);
  try { data = JSON.parse(raw); } catch(e) { throw new Error(\`Bad JSON: \${raw.slice(0,100)}\`); }
  if (data.error) throw new Error(data.error.message);
  const text = data.result?.content?.[0]?.text || '';
  if (!text) throw new Error(\`Empty result: \${raw.slice(0,300)}\`);
  return text;
}

// Parse raw text into rows
function parseTextToRows(text) {
  return text.split('\\n')
    .filter(l => l.includes('|'))
    .map(l => {
      const parts = l.split('|').map(s => s.trim());
      return parts;
    });
}

// Show loading
function showLoading(id) {
  document.getElementById(id).innerHTML = \`
    <div class="loading"><div class="spinner"></div>Querying LUSTAT API...</div>\`;
}

// Show error
function showError(id, msg) {
  document.getElementById(id).innerHTML = \`<div class="error-box">⚠ \${msg}</div>\`;
}

// TIME SERIES
async function runTimeSeries() {
  const sector = document.getElementById('ts-sector').value;
  const edu    = document.getElementById('ts-edu').value;
  const start  = document.getElementById('ts-start').value;
  const end    = document.getElementById('ts-end').value;
  showLoading('ts-result');
  try {
    const text = await callMCP('get_wage_data', {
      sector, education: edu, startPeriod: start,
      ...(end ? { endPeriod: end } : {})
    });
    // Format: "2010 | Q | _T | 4.124,282 EUR"
    const dataRows = text.split('\n')
      .filter(l => /^\d{4}\s*\|/.test(l))
      .map(l => {
        const parts = l.split('|').map(s => s.trim());
        const val = parseFloat((parts[3]||'').replace(/[^\d.]/g,''));
        return { year: parts[0], val };
      }).filter(r => !isNaN(r.val) && r.val > 0);
    if (!dataRows.length) { showError('ts-result', \`No data. Raw: \${text.slice(0,200)}\`); return; }
    const maxVal = Math.max(...dataRows.map(r => r.val));
    document.getElementById('ts-result').innerHTML = \`
      <div class="result-card">
        <div class="result-header">
          <div class="result-title">\${NACE[sector]||sector}</div>
          <div class="result-meta">\${EDU[edu]||edu} · \${start}\${end?'–'+end:' → latest'}</div>
        </div>
        \${dataRows.map(r => \`<div class="bar-row">
          <div class="bar-label">\${r.year}</div>
          <div class="bar-track"><div class="bar-fill" style="width:\${(r.val/maxVal*100).toFixed(1)}%"></div></div>
          <div class="bar-val">\${r.val.toLocaleString('fr-LU')} €</div>
        </div>\`).join('')}
      </div>\`;
  } catch(e) { showError('ts-result', e.message); }
}

async function runSectors() {
  const edu  = document.getElementById('sec-edu').value;
  const year = document.getElementById('sec-year').value;
  showLoading('sec-result');
  try {
    const text = await callMCP('compare_sectors', { education: edu, year });
    // Format: "1. Financial & insurance          5.927,209 EUR"
    const data = text.split('\n')
      .filter(l => /^\d+\./.test(l))
      .map(l => {
        const match = l.match(/^\d+\.\s+(.+?)\s+([\d.,]+)\s+EUR/);
        if (!match) return null;
        const val = parseFloat(match[2].replace(/[^\d.]/g,''));
        return { label: match[1].trim(), val };
      }).filter(r => r && r.val > 0);
    if (!data.length) { showError('sec-result', \`No data. Raw: \${text.slice(0,200)}\`); return; }
    const maxVal = Math.max(...data.map(r => r.val));
    document.getElementById('sec-result').innerHTML = \`
      <div class="result-card">
        <div class="result-header">
          <div class="result-title">Sector Ranking \${year}</div>
          <div class="result-meta">\${EDU[edu]||edu}</div>
        </div>
        \${data.map((r,i) => \`<div class="bar-row">
          <div class="bar-label" title="\${r.label}">\${i+1}. \${r.label}</div>
          <div class="bar-track"><div class="bar-fill" style="width:\${(r.val/maxVal*100).toFixed(1)}%"></div></div>
          <div class="bar-val">\${r.val.toLocaleString('fr-LU')} €</div>
        </div>\`).join('')}
      </div>\`;
  } catch(e) { showError('sec-result', e.message); }
}

async function runEducation() {
  const sector = document.getElementById('edu-sector').value;
  const year   = document.getElementById('edu-year').value;
  showLoading('edu-result');
  try {
    const text = await callMCP('compare_education', { sector, year });
    // Format: "Tertiary education (ISCED 5-8)     7.234,5 EUR"
    const data = text.split('\n')
      .filter(l => l.includes('EUR') && !l.startsWith('#') && !l.startsWith('*') && !l.startsWith('S'))
      .map(l => {
        const match = l.match(/^(.+?)\s+([\d.,]+)\s+EUR/);
        if (!match) return null;
        const val = parseFloat(match[2].replace(/[^\d.]/g,''));
        return { label: match[1].trim(), val };
      }).filter(r => r && r.val > 0);
    if (!data.length) { showError('edu-result', \`No data. Raw: \${text.slice(0,200)}\`); return; }
    const maxVal = Math.max(...data.map(r => r.val));
    document.getElementById('edu-result').innerHTML = \`
      <div class="result-card">
        <div class="result-header">
          <div class="result-title">Education Impact \${year}</div>
          <div class="result-meta">\${NACE[sector]||sector}</div>
        </div>
        \${data.map(r => \`<div class="bar-row">
          <div class="bar-label" title="\${r.label}">\${r.label}</div>
          <div class="bar-track"><div class="bar-fill" style="width:\${(r.val/maxVal*100).toFixed(1)}%"></div></div>
          <div class="bar-val">\${r.val.toLocaleString('fr-LU')} €</div>
        </div>\`).join('')}
      </div>\`;
  } catch(e) { showError('edu-result', e.message); }
}


// Check API status on load
(async () => {
  try {
    const r = await fetch('/health');
    const d = await r.json();
    if (d.status === 'ok') {
      document.getElementById('status-dot').className = 'dot online';
      document.getElementById('status-text').textContent = 'API online';
    }
  } catch(e) {
    document.getElementById('status-dot').className = 'dot';
    document.getElementById('status-text').textContent = 'API offline';
  }
})();
</script>
</body>
</html>
